aid: tickettailor
url: https://raw.githubusercontent.com/api-evangelist/tickettailor/refs/heads/main/apis.yml
name: Ticket Tailor
kind: company
description: Ticket Tailor is an online event ticketing platform that lets organizers
  sell tickets and manage box offices for events, from single dates to recurring
  event series. Its public REST API (base https://api.tickettailor.com/v1) exposes
  the box office programmatically - events, event series, orders, issued tickets,
  ticket types, vouchers, and check-ins - authenticated with an API key over HTTP
  Basic Auth. The API is read-and-write, supports cursor-based pagination, and is
  rate limited to 5000 requests per 30 minutes.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Event Ticketing
- Events
- Ticketing
- Box Office
- Payments
- Registration
created: '2026-07-05'
modified: '2026-07-05'
