meters:
- name: paid_tickets
  description: Paid tickets issued, billed per ticket on the pay-as-you-sell rate.
  unit: tickets
  aggregation: sum
  dimensions:
  - box_office
  - event
  - event_series
- name: prepaid_credits
  description: Ticket credits purchased in advance and consumed as paid tickets sell.
  unit: credits
  aggregation: sum
  dimensions:
  - box_office
- name: seating_chart_tickets
