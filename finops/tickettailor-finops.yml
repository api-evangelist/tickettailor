description: >-
  FinOps view of Ticket Tailor spend. Ticket Tailor charges no software
  subscription and no separate API access fee; cost is driven almost entirely by
  a per-ticket fee on paid tickets sold. Two pricing modes exist: pay-as-you-sell
  (a flat per-ticket rate billed as tickets sell) and pre-paid credits (ticket
  credits purchased in advance at a lower effective per-ticket rate). Free events
  are effectively free, and the first five sales on a box office are free. Because
  spend scales with paid tickets issued, the primary cost meter is tickets, and
  optimization is about choosing pre-paid credit bundles for predictable volume
  and passing booking fees on to buyers.
notes: >-
  Per-unit rates (about 0.85 USD per ticket pay-as-you-sell, as low as 0.30 USD
  per ticket pre-paid, plus VAT; 50 percent charity discount) are list prices and
  are not reconciled here. Seating-chart tickets incur a fee even when free.
  Verify at https://www.tickettailor.com/pricing.
