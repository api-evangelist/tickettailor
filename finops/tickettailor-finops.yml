  unit: tickets
  aggregation: sum
  dimensions:
  - box_office
  - event
principles:
- name: Visibility
  description: Track paid tickets issued per event and event series to see where per-ticket fees accrue.
- name: Allocation
  description: Attribute ticket fees to the box office, event series, and event that generated them.
- name: Optimization
  description: Buy pre-paid credit bundles for predictable volume to lower the per-ticket rate, pass booking fees to buyers, and apply the charity discount if eligible.
- name: Accountability
  description: Reconcile monthly ticket volume against pre-paid credit balances and expected per-ticket spend.
